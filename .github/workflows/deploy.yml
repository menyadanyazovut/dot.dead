name: Deploy dot.dead to GitHub Pages

# Publishes the game (the "dot.dead v2" folder) to GitHub Pages on every push to
# main. No build step — it just uploads the static files as the Pages site root.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'dot.dead v2'
      - id: deployment
        uses: actions/deploy-pages@v4
